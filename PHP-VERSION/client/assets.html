<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mobile-first crypto exchange web application with centralized market and chart configuration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>AURX Exchange Assets</title>
    <link rel="stylesheet" href="./assets/common.css" />
    <link rel="stylesheet" href="./assets/pages/assets.css" />
    <script defer src="./assets/common.js"></script>
    <script defer src="./assets/pages/assets.js"></script>
  </head>
  <body data-static-route="/assets" data-page="assets">
    <div id="root">
      <div class="app-shell">
        <div class="screen">
          <header class="page-title-row">
            <div class="page-title-side left"></div>
            <h1>Assets</h1>
            <div class="page-title-side right"></div>
          </header>
          <section class="asset-summary-card">
            <div class="asset-card-circles"></div>
            <div class="asset-card-copy">
              <div class="label-row">
                <span>Total Assets</span
                ><svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-eye"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M2 12s4-6 10-6 10 6 10 6-4 6-10 6S2 12 2 12zm10 2.5a2.5 2.5 0 100-5 2.5 2.5 0 000 5z"
                  ></path>
                </svg>
              </div>
              <strong>≈ $0.00</strong>
              <p>
                Today's PnL: <strong>0</strong>
                <svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-refresh"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M17 8V4l-3 3M7 16v4l3-3M7 8a5 5 0 019-2M17 16a5 5 0 01-9 2"
                  ></path>
                </svg>
              </p>
            </div>
          </section>
          <section class="quick-actions-grid assets-actions">
            <a
              class="action-shortcut"
              href="./deposit.html"
              data-discover="true"
              ><span class="action-circle"
                ><svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-deposit"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 5v10M8 9l4-4 4 4M6 17h12"></path></svg></span
              ><span>Deposit</span></a
            ><a
              class="action-shortcut"
              href="./withdraw.html"
              data-discover="true"
              ><span class="action-circle"
                ><svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-withdrawal"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M12 19V9M8 13l4 4 4-4M6 7h12"></path></svg></span
              ><span>Withdrawal</span></a
            ><a
              class="action-shortcut"
              href="./convert.html"
              data-discover="true"
              ><span class="action-circle"
                ><svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-convert"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M7 8h10l-2-2M17 16H7l2 2M8 8l-2 2m10 6l2-2"
                  ></path></svg></span
              ><span>Convert</span></a
            ><a
              class="action-shortcut"
              href="./transfer.html"
              data-discover="true"
              ><span class="action-circle"
                ><svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-transfer"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path
                    d="M6 8h12M6 16h12M15 5l3 3-3 3M9 13l-3 3 3 3"
                  ></path></svg></span
              ><span>Transfer</span></a
            >
          </section>
          <section class="account-toggle-row">
            <div>
              <span>Current Account:</span><strong>Real Account</strong>
            </div>
            <button type="button" class="toggle-chip">
              <svg
                viewBox="0 0 24 24"
                class="ui-icon icon-swap-horizontal"
                fill="none"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M7 9h10l-2-2M17 15H7l2 2"></path></svg
              >Toggle
            </button>
          </section>
          <section class="account-section">
            <h2>My account</h2>
            <div class="account-card-stack">
              <a
                class="account-card-link"
                href="./exchange.html"
                data-discover="true"
                ><article class="account-card">
                  <div><span>Exchange</span><strong>≈ $0.00</strong></div>
                  <svg
                    viewBox="0 0 24 24"
                    class="ui-icon icon-chevron-right"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M9 6l6 6-6 6"></path>
                  </svg></article></a
              ><a
                class="account-card-link"
                href="./trade-assets.html"
                data-discover="true"
                ><article class="account-card">
                  <div><span>Trade</span><strong>≈ $0.00</strong></div>
                  <svg
                    viewBox="0 0 24 24"
                    class="ui-icon icon-chevron-right"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M9 6l6 6-6 6"></path>
                  </svg></article></a
              ><a
                class="account-card-link"
                href="./perpetual-assets.html"
                data-discover="true"
                ><article class="account-card">
                  <div><span>Perpetual</span><strong>≈ $0.00</strong></div>
                  <svg
                    viewBox="0 0 24 24"
                    class="ui-icon icon-chevron-right"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="1.8"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    aria-hidden="true"
                  >
                    <path d="M9 6l6 6-6 6"></path>
                  </svg></article
              ></a>
            </div>
          </section>
        </div>
        <nav class="bottom-nav nav-count-4" aria-label="Primary navigation">
          <a class="nav-item" href="./index.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-home"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M4 11l8-7 8 7v9H4z"></path></svg
            ><span>Home</span></a
          ><a class="nav-item" href="./markets.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-markets"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5 17.5l4.2-4.5 3.2 2.7 5.6-7.2"></path>
              <path d="M15.7 8.5H18v2.3"></path></svg
            ><span>Markets</span></a
          ><a class="nav-item" href="./futures.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-futures"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5.5 8.5h9"></path>
              <path d="M11.5 5.5l3 3-3 3"></path>
              <path d="M18.5 15.5h-9"></path>
              <path d="M12.5 12.5l-3 3 3 3"></path></svg
            ><span>Trade</span></a
          ><a
            aria-current="page"
            class="nav-item active active"
            href="./assets.html"
            data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-assets"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M4.5 8.5h13a2 2 0 012 2v7a2 2 0 01-2 2h-13a2 2 0 01-2-2v-7a2 2 0 012-2z"
              ></path>
              <path d="M4.5 10.5h13"></path>
              <path d="M14.5 14h3"></path>
              <path d="M7 8.5V7a1.5 1.5 0 011.5-1.5h7"></path></svg
            ><span>Assets</span></a
          >
        </nav>
      </div>
    </div>
  </body>
</html>
