<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mobile-first crypto exchange web application with centralized market and chart configuration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>AURX Exchange Settings</title>
    <link rel="stylesheet" href="./assets/common.css" />
    <link rel="stylesheet" href="./assets/pages/settings.css" />
    <script defer src="./assets/common.js"></script>
    <script defer src="./assets/pages/settings.js"></script>
  </head>
  <body data-static-route="/settings" data-page="settings">
    <div id="root">
      <div class="app-shell">
        <div class="screen">
          <header class="page-title-row">
            <div class="page-title-side left">
              <button type="button" class="icon-button ghost">
                <svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-back"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M15 6l-6 6 6 6"></path>
                </svg>
              </button>
            </div>
            <h1>Settings</h1>
            <div class="page-title-side right"></div>
          </header>
          <section class="profile-page-hero">
            <span>Preferences</span>
            <h2>Adjust app behavior and account defaults.</h2>
            <p>
              Customize notifications, interface behavior, and account safety
              preferences for this device.
            </p>
          </section>
          <section class="settings-list">
            <article class="settings-row-card settings-row-card-button">
              <button type="button" class="settings-inline-action">
                <div><span>Language</span><strong>English</strong></div>
                <svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-chevron-right"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M9 6l6 6-6 6"></path>
                </svg>
              </button>
            </article>
            <article class="settings-row-card">
              <div><span>Push Alerts</span><strong>Enabled</strong></div>
              <button
                type="button"
                class="settings-switch active"
                aria-label="Push Alerts"
              >
                <span></span>
              </button>
            </article>
            <article class="settings-row-card">
              <div><span>Theme Preset</span><strong>Dark mode</strong></div>
              <button
                type="button"
                class="settings-switch active"
                aria-label="Theme Preset"
              >
                <span></span>
              </button>
            </article>
          </section>
        </div>
        <nav class="bottom-nav nav-count-4" aria-label="Primary navigation">
          <a class="nav-item" href="./index.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-home"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M4 11l8-7 8 7v9H4z"></path></svg
            ><span>Home</span></a
          ><a class="nav-item" href="./markets.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-markets"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5 17.5l4.2-4.5 3.2 2.7 5.6-7.2"></path>
              <path d="M15.7 8.5H18v2.3"></path></svg
            ><span>Markets</span></a
          ><a class="nav-item" href="./futures.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-futures"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M5.5 8.5h9"></path>
              <path d="M11.5 5.5l3 3-3 3"></path>
              <path d="M18.5 15.5h-9"></path>
              <path d="M12.5 12.5l-3 3 3 3"></path></svg
            ><span>Trade</span></a
          ><a class="nav-item" href="./assets.html" data-discover="true"
            ><svg
              viewBox="0 0 24 24"
              class="ui-icon icon-assets"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path
                d="M4.5 8.5h13a2 2 0 012 2v7a2 2 0 01-2 2h-13a2 2 0 01-2-2v-7a2 2 0 012-2z"
              ></path>
              <path d="M4.5 10.5h13"></path>
              <path d="M14.5 14h3"></path>
              <path d="M7 8.5V7a1.5 1.5 0 011.5-1.5h7"></path></svg
            ><span>Assets</span></a
          >
        </nav>
      </div>
    </div>
  </body>
</html>
