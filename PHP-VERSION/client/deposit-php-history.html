<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Mobile-first crypto exchange web application with centralized market and chart configuration."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <title>AURX Exchange PHP Deposit History</title>
    <link rel="stylesheet" href="./assets/common.css" />
    <link rel="stylesheet" href="./assets/pages/deposit-php-history.css" />
    <script defer src="./assets/common.js"></script>
    <script defer src="./assets/pages/deposit-php-history.js"></script>
  </head>
  <body
    data-static-route="/deposit/php/history"
    data-page="deposit-php-history"
  >
    <div id="root">
      <div class="app-shell">
        <div class="screen no-bottom-nav php-history-screen">
          <header class="page-title-row">
            <div class="page-title-side left">
              <button type="button" class="icon-button ghost">
                <svg
                  viewBox="0 0 24 24"
                  class="ui-icon icon-back"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  aria-hidden="true"
                >
                  <path d="M15 6l-6 6 6 6"></path>
                </svg>
              </button>
            </div>
            <h1>PHP Payment History</h1>
            <div class="page-title-side right"></div>
          </header>
          <section class="php-history-hero">
            <span>Payment records</span
            ><strong
              >Review approved, rejected, and pending PHP funding
              requests.</strong
            >
          </section>
          <section class="php-history-list">
            <article class="php-history-card empty">
              <strong>No PHP payment requests yet</strong>
              <p>
                Admin-approved, rejected, and pending requests will appear here
                after you submit them from the Buy with PHP page.
              </p>
            </article>
          </section>
          <button type="button" class="primary-action">
            Back To Buy With PHP
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
